version: 2
updates:
  # GitHub Actions — keep workflow action references current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ['*']

  # npm — GNOME extension (TypeScript + esbuild).
  - package-ecosystem: npm
    directory: /apps/linux/gnome
    schedule:
      interval: weekly
      day: monday
    groups:
      npm:
        patterns: ['*']

  # Cargo — shared Linux helper (Rust).
  - package-ecosystem: cargo
    directory: /apps/linux/common/claudebar-helper
    schedule:
      interval: weekly
      day: monday
    groups:
      cargo:
        patterns: ['*']

  # NuGet — Windows WPF app (.NET 8).
  - package-ecosystem: nuget
    directory: /apps/windows
    schedule:
      interval: weekly
      day: monday
    groups:
      nuget:
        patterns: ['*']
