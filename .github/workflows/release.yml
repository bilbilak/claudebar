name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist on origin.'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ---------------------------------------------------------------------
  # macOS
  # ---------------------------------------------------------------------
  macos:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}
      - name: Bundle .app
        working-directory: apps/macos
        run: make bundle
      - name: Zip the .app
        working-directory: apps/macos/dist
        run: zip -r "../claudebar-macos-${TAG_NAME}.zip" ClaudeBar.app
      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: apps/macos/claudebar-macos-*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Windows
  # ---------------------------------------------------------------------
  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Publish
        working-directory: apps/windows
        run: dotnet publish ClaudeBar.csproj -c Release -r win-x64 --self-contained false -o publish
      - name: Zip publish output
        working-directory: apps/windows
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath "claudebar-windows-$env:TAG_NAME.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: apps/windows/claudebar-windows-*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Linux — shared Rust helper (x86_64 + aarch64)
  # ---------------------------------------------------------------------
  linux-helper:
    name: Build Linux helper (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi
      - name: Build
        working-directory: apps/linux/common/claudebar-helper
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage artifact
        working-directory: apps/linux/common/claudebar-helper
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/claudebar-helper artifact/
          cd artifact
          tar -czf "claudebar-helper-${TAG_NAME}-${{ matrix.suffix }}.tar.gz" claudebar-helper
      - uses: actions/upload-artifact@v7
        with:
          name: linux-helper-${{ matrix.suffix }}
          path: apps/linux/common/claudebar-helper/artifact/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Linux — GNOME Shell extension zip (extensions.gnome.org-ready)
  # ---------------------------------------------------------------------
  linux-gnome:
    name: Build Linux GNOME extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/linux/gnome/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y libglib2.0-bin
      - name: Pack
        working-directory: apps/linux/gnome
        run: |
          npm ci
          npm run pack
          mv claudebar@bilbilak.org.shell-extension.zip \
             "claudebar-linux-gnome-${TAG_NAME}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: linux-gnome
          path: apps/linux/gnome/claudebar-linux-gnome-*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Linux — KDE Plasmoid tarball
  # ---------------------------------------------------------------------
  linux-kde:
    name: Build Linux KDE Plasmoid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}
      - name: Package
        working-directory: apps/linux/kde
        run: |
          mkdir -p dist
          tar -czf "dist/claudebar-kde-${TAG_NAME}.plasmoid" metadata.json contents/
      - uses: actions/upload-artifact@v7
        with:
          name: linux-kde
          path: apps/linux/kde/dist/*.plasmoid
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Linux — Cinnamon applet zip
  # ---------------------------------------------------------------------
  linux-cinnamon:
    name: Build Linux Cinnamon applet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}
      - name: Package
        working-directory: apps/linux/cinnamon
        run: |
          make pack
          mv dist/claudebar@bilbilak.org.zip \
             "dist/claudebar-linux-cinnamon-${TAG_NAME}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: linux-cinnamon
          path: apps/linux/cinnamon/dist/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # GitHub release
  # ---------------------------------------------------------------------
  release:
    name: Publish GitHub release
    needs:
      - macos
      - windows
      - linux-helper
      - linux-gnome
      - linux-kde
      - linux-cinnamon
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG_NAME }}
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect artifacts
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.plasmoid' \) -print -exec cp {} dist/ \;
          ls -lh dist/
      - name: Generate SHA256 checksums
        working-directory: dist
        run: |
          sha256sum * > "claudebar-${TAG_NAME}-SHA256SUMS"
          cat "claudebar-${TAG_NAME}-SHA256SUMS"
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(env.TAG_NAME, '-') }}
