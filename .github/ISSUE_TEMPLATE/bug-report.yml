name: '🐞 Bug Report'
description: File a bug report
title: '🐞 [BUG]: '
labels: ['malfunction', 'triage']
assignees:
  - 4r7if3x
body:
  - type: markdown
    attributes:
      value: Your diligent report makes a difference! Your input help us identify and address malfunctions in our product.
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of our software are you running?
      placeholder: 'e.g. 1.0.0'
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which desktop front-end is affected?
      options:
        - macOS (menu bar)
        - Windows (tray / floating meter)
        - Linux / GNOME
        - Linux / KDE Plasma
        - Linux / Cinnamon
        - Linux / XFCE
        - Linux / MATE
        - Linux / Budgie
        - Linux / LXQt
        - Linux / claudebar-helper (tray fallback)
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What's the problem?
      description: Please tell us what did you expect to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Relevant screenshots
      placeholder: |
        ![](https://i.imgur.com/screenshot_1.png)
        ![](https://i.imgur.com/screenshot_2.png)
        ![](https://i.imgur.com/screenshot_3.png)
        ...
      description: 'Please [upload](https://imgur.com/upload) any relevant screenshots and embed them here.'
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: 'Before submitting this issue, you must read our [Code of Conduct](https://github.com/bilbilak/.github/blob/main/docs/CODE_OF_CONDUCT.md).'
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
